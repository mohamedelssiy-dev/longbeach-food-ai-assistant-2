<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Food Assistant | Long Beach Resort</title>

<style>

body{
font-family:Arial,sans-serif;
background:#08111f;
color:white;
margin:0;
}

header{
background:#0b1320;
padding:30px;
text-align:center;
}

h1{
color:#d4af37;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.card{
background:#122033;
padding:25px;
border-radius:20px;
border:1px solid rgba(212,175,55,.25);
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
}

button{
background:#d4af37;
color:black;
border:none;
padding:12px 25px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

#result{
margin-top:20px;
padding:20px;
background:#0f1b2c;
border-radius:10px;
min-height:150px;
}

.back{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#d4af37;
color:black;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>🤖 AI Food Assistant</h1>

<p>
Ask about restaurants, menus, allergies and premium benefits
</p>

</header>

<div class="container">

<div class="card">

<input
id="question"
type="text"
placeholder="Example: seafood restaurant"
/>

<button onclick="askAI()">
Ask AI
</button>

<div id="result">

Welcome!

Try asking:

<ul>
<li>seafood restaurant</li>
<li>indian food</li>
<li>italian food</li>
<li>asian food</li>
<li>vegetarian dishes</li>
<li>gluten allergy</li>
<li>shellfish allergy</li>
<li>premium benefits</li>
<li>room service</li>
</ul>

</div>

</div>

<a href="index.html" class="back">
⬅ Back to Home
</a>

</div>

<script>

function askAI(){

let q =
document.getElementById("question")
.value
.toLowerCase();

let result="";

if(
q.includes("vegetarian") ||
q.includes("vegan")
){

result=`
<h3>🥗 Vegetarian Options</h3>

<ul>
<li>Chana Masala (Breeze)</li>
<li>Vegetable Curry (Breeze)</li>
<li>Dal Makhani (Breeze)</li>
<li>Sabzi Biryani (Breeze)</li>
<li>Luhan Vegetables (Openbill)</li>
<li>Korean Vegetable Noodles (Openbill)</li>
</ul>
`;

}

else if(
q.includes("seafood")
){

result=`
<h3>🦞 Seafood Restaurant</h3>

<p><strong>Mary Sol</strong></p>

<ul>
<li>Grilled Salmon Steak</li>
<li>Seafood Pasta</li>
<li>Mixed Seafood</li>
<li>Calamari Casserole</li>
</ul>
`;

}

else if(
q.includes("indian")
){

result=`
<h3>🇮🇳 Indian Cuisine</h3>

<p><strong>BREEZE Restaurant</strong></p>

<ul>
<li>Murgh Tandoori</li>
<li>Murgh Jalfrezi</li>
<li>Machi Madras</li>
<li>Gosht Vindaloo</li>
<li>Murgh Biryani</li>
</ul>
`;

}

else if(
q.includes("italian")
){

result=`
<h3>🍝 Italian Cuisine</h3>

<p><strong>Dolce Vita</strong></p>

<ul>
<li>Lasagna</li>
<li>Penne Alfredo</li>
<li>Pizza Selection</li>
</ul>
`;

}

else if(
q.includes("asian")
){

result=`
<h3>🥢 Asian Cuisine</h3>

<p><strong>Openbill Restaurant</strong></p>

<ul>
<li>Spring Roll</li>
<li>Sweet & Sour Chicken</li>
<li>Chicken Tao</li>
<li>Korean Noodles</li>
</ul>
`;

}

else if(
q.includes("room service")
){

result=`
<h3>🛎️ Room Service</h3>

<ul>
<li>Italian Selection</li>
<li>Asian Selection</li>
<li>Seafood Selection</li>
<li>Desserts</li>
<li>Beverages</li>
</ul>
`;

}

else if(
q.includes("gluten")
){

result=`
<h3>⚠️ Gluten Alert</h3>

Avoid:

<ul>
<li>Aloo Samosa</li>
<li>Umm Ali</li>
<li>Oriental Sweets</li>
<li>Orzo Soup</li>
<li>Fish & Chips</li>
</ul>
`;

}

else if(
q.includes("shellfish")
){

result=`
<h3>🦞 Shellfish Allergy</h3>

Avoid:

<ul>
<li>Lobster Thermidor</li>
<li>Asian Style Lobster</li>
<li>Zinga</li>
<li>Grilled Prawns</li>
</ul>
`;

}

else if(
q.includes("premium")
){

result=`
<h3>⭐ Premium Benefits</h3>

<ul>
<li>Breeze Indian Lunch Included</li>
<li>Premium Restaurant Access</li>
<li>Premium Deluxe Benefits</li>
</ul>
`;

}

else if(
q.includes("restaurant")
){

result=`
<h3>🍽 Restaurants</h3>

ALDENTE<br>
D'WHITE<br>
BREEZE<br>
PODIUM<br>
Dolce Vita<br>
Openbill<br>
Mary Sol<br>
Alka Dollia<br>
Cactus
`;

}

else{

result=`
<h3>🤖 AI Assistant</h3>

Try asking:

<ul>
<li>indian food</li>
<li>italian food</li>
<li>asian food</li>
<li>seafood restaurant</li>
<li>room service</li>
<li>gluten allergy</li>
<li>shellfish allergy</li>
<li>premium benefits</li>
</ul>
`;

}

document.getElementById("result").innerHTML=result;

}

</script>

</body>
</html>
