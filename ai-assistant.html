<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Food Assistant | Long Beach Resort</title>

<style>

body{
font-family:Arial,sans-serif;
background:#08111f;
color:white;
margin:0;
}

header{
background:#0b1320;
padding:30px;
text-align:center;
}

h1{
color:#d4af37;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.card{
background:#122033;
padding:25px;
border-radius:15px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
}

button{
background:#d4af37;
color:black;
border:none;
padding:12px 25px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

#result{
margin-top:20px;
padding:20px;
background:#0f1b2c;
border-radius:10px;
min-height:120px;
}

.back{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#d4af37;
color:black;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>🤖 AI Food Assistant</h1>
<p>Ask about restaurants, allergies and menus</p>
</header>

<div class="container">

<div class="card">

<input
id="question"
type="text"
placeholder="Example: vegetarian dishes"
/>

<button onclick="askAI()">
Ask AI
</button>

<div id="result">
Welcome! Ask me about food, restaurants or allergies.
</div>

</div>

<a href="index.html" class="back">
⬅ Back to Home
</a>

</div>

<script>

function askAI(){

let q=document.getElementById("question").value.toLowerCase();

let result="";

if(
q.includes("vegetarian") ||
q.includes("vegan")
){

result=`
<h3>🥗 Vegetarian Options</h3>

<ul>
<li>Chana Masala (Breeze)</li>
<li>Vegetable Curry (Breeze)</li>
<li>Dal Makhani (Breeze)</li>
<li>Sabzi Biryani (Breeze)</li>
<li>Luhan Vegetables (Openbill)</li>
<li>Korean Vegetable Noodles (Openbill)</li>
</ul>
`;

}

else if(
q.includes("seafood")
){

result=`
<h3>🐟 Seafood Recommendations</h3>

<p><strong>Mary Sol Restaurant</strong></p>

<ul>
<li>Grilled Salmon Steak</li>
<li>Seafood Pasta</li>
<li>Mixed Seafood</li>
<li>Calamari Casserole</li>
</ul>
`;

}

else if(
q.includes("gluten")
){

result=`
<h3>⚠️ Gluten Alert</h3>

Avoid:

<ul>
<li>Aloo Samosa</li>
<li>Umm Ali</li>
<li>Oriental Sweets</li>
<li>Orzo Soup</li>
<li>Fish & Chips</li>
</ul>
`;

}

else if(
q.includes("premium")
){

result=`
<h3>⭐ Premium Benefits</h3>

<ul>
<li>Breeze Indian Lunch Included</li>
<li>Premium Restaurant Access</li>
<li>Premium Deluxe Benefits</li>
</ul>
`;

}

else if(
q.includes("open")
||
q.includes("restaurant")
){

result=`
<h3>🍽 Available Restaurants</h3>

ALDENTE<br>
D'WHITE<br>
BREEZE<br>
Dolce Vita<br>
Openbill<br>
Mary Sol<br>
Alka Dollia<br>
PODIUM
`;

}

else{

result=`
<h3>🤖 AI Assistant</h3>

Try asking:

<ul>
<li>vegetarian dishes</li>
<li>seafood restaurant</li>
<li>gluten allergy</li>
<li>premium benefits</li>
<li>restaurants</li>
</ul>
`;

}

document.getElementById("result").innerHTML=result;

}

</script>

</body>
</html>
