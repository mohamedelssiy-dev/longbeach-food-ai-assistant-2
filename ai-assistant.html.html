<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant 2.0 | Long Beach Resort</title>
<style>
body{font-family:Arial,sans-serif;background:#08111f;color:#fff;margin:0}
header{background:#0b1320;padding:25px;text-align:center}
h1{color:#d4af37}
.container{max-width:1000px;margin:auto;padding:25px}
.card{background:#122033;padding:25px;border-radius:18px}
input{width:100%;padding:14px;border:none;border-radius:10px;margin-bottom:15px}
button{background:#d4af37;color:#000;border:none;padding:12px 22px;border-radius:10px;font-weight:bold;cursor:pointer}
#result{margin-top:20px;background:#0f1b2c;padding:20px;border-radius:12px;min-height:180px}
.back{display:inline-block;margin-top:20px;padding:12px 18px;background:#d4af37;color:#000;text-decoration:none;border-radius:10px}
</style>
</head>
<body>
<header>
<h1>🤖 AI Assistant 2.0</h1>
<p>Long Beach Food & Beverage Concierge</p>
</header>

<div class="container">
<div class="card">
<input id="question" type="text" placeholder="Ask about restaurants, allergies, room service or premium benefits">
<button onclick="askAI()">Ask AI</button>

<div id="result">
Welcome to Long Beach Food & Beverage AI Assistant.<br><br>
Try asking:<br>
• Seafood Restaurant<br>
• Indian Food<br>
• Premium Benefits<br>
• Room Service<br>
• Gluten Allergy<br>
• Tell me about Breeze
</div>
</div>

<a href="index.html" class="back">⬅ Back to Home</a>
</div>

<script>
function askAI(){
let q=document.getElementById("question").value.toLowerCase().trim();
let r="";

if(q.includes("hello")||q.includes("hi")){
r="<h3>👋 Welcome</h3>How may I help you today?";
}
else if(q.includes("restaurants")||q==="restaurant"){
r="<h3>🍽 Restaurants</h3>ALDENTE<br>D'WHITE<br>BREEZE<br>Dolce Vita<br>Openbill<br>Mary Sol<br>Alka Dollia<br>PODIUM<br>Cactus";
}
else if(q.includes("seafood")){
r="<h3>🦞 Seafood Recommendation</h3><b>Mary Sol</b><br>Grilled Salmon<br>Seafood Pasta<br>Mixed Seafood";
}
else if(q.includes("indian")){
r="<h3>🇮🇳 Indian Cuisine</h3><b>BREEZE</b><br>Murgh Tandoori<br>Murgh Biryani<br>Dal Makhani<br>Chana Masala";
}
else if(q.includes("italian")){
r="<h3>🍝 Italian Cuisine</h3><b>Dolce Vita</b><br>Italian specialty restaurant.";
}
else if(q.includes("asian")){
r="<h3>🥢 Asian Cuisine</h3><b>Openbill</b><br>Spring Roll<br>Chicken Tao<br>Korean Noodles";
}
else if(q.includes("room service")){
r="<h3>🛎️ Room Service</h3>Available through Room Service 2.0 with smart recommendations and order summary.";
}
else if(q.includes("premium")){
r="<h3>⭐ Premium Benefits</h3>Breeze Indian Lunch Included<br>Premium Restaurant Access<br>Premium Deluxe Benefits";
}
else if(q.includes("gluten")){
r="<h3>⚠️ Gluten Allergy</h3>Avoid: Aloo Samosa, Umm Ali, Orzo Soup, Oriental Sweets.";
}
else if(q.includes("shellfish")){
r="<h3>🦐 Shellfish Allergy</h3>Avoid: Zinga, Lobster Thermidor, Asian Style Lobster.";
}
else if(q.includes("vegetarian")||q.includes("vegan")){
r="<h3>🥗 Vegetarian Options</h3>Chana Masala<br>Vegetable Curry<br>Dal Makhani<br>Sabzi Biryani";
}
else if(q.includes("recommend dinner")){
r="<h3>🍽 Dinner Recommendation</h3>Mary Sol for seafood, Breeze for Indian cuisine, Dolce Vita for Italian dining.";
}
else if(q.includes("breeze")){
r="<h3>🇮🇳 BREEZE</h3>Indian Cuisine<br>Murgh Tandoori<br>Murgh Biryani<br>Dal Makhani";
}
else if(q.includes("mary sol")){
r="<h3>🦞 Mary Sol</h3>Seafood Cuisine<br>Grilled Salmon<br>Seafood Pasta<br>Mixed Seafood";
}
else if(q.includes("openbill")){
r="<h3>🥢 Openbill</h3>Asian Cuisine<br>Spring Roll<br>Chicken Tao<br>Korean Noodles";
}
else if(q.includes("alka dollia")){
r="<h3>🏝 Alka Dollia</h3>Beach Area<br>75 Seats<br>Nubian Cuisine<br>18:30 - 22:00";
}
else if(q.includes("podium")){
r="<h3>🌍 PODIUM</h3>International Cuisine Restaurant.";
}
else{
r="<h3>🤖 AI Assistant</h3>Try asking:<br>• Seafood Restaurant<br>• Indian Food<br>• Premium Benefits<br>• Room Service<br>• Gluten Allergy<br>• Tell me about Breeze";
}

document.getElementById("result").innerHTML=r;
}
</script>
</body>
</html>
